services:
  # ==========================================
  # EMBEDDING LAYER (TEI)
  # ==========================================
  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    container_name: tei-embedding
    restart: unless-stopped
    command: --model-id BAAI/bge-small-en-v1.5
    ports:
      - "8081:80"
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  ai-net:
    external: true
    driver: bridge
