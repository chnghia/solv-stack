networks:
  ai-net:
    driver: bridge

services:
  # ==========================================
  # GATEKEEPER (INTERNAL PROXY)
  # ==========================================
  nginx:
    image: nginx:latest
    container_name: solv-proxy
    restart: always
    ports:
      - "8080:80" # ENTRY POINT DUY NHẤT
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - litellm
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # API ROUTING LAYER
  # ==========================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-gateway
    restart: always
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-solv-stack}
      - LITELLM_CANCEL_UPSTREAM_ON_DISCONNECT=True
      - LITELLM_LOG=INFO
      - LITELLM_HTTP_TIMEOUT=600
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]
    expose:
      - "4000"
    networks:
      - ai-net
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"  # Command to execute for health check
      interval: 30s  # Perform health check every 30 seconds
      timeout: 10s   # Health check command times out after 10 seconds
      retries: 3     # Retry up to 3 times if health check fails
      start_period: 40s  # Wait 40 seconds after container start before beginning health checks

  # ==========================================
  # LOGIC & DATA LAYER
  # ==========================================
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: qdrant-db
