  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    hostname: searxng
    restart: always
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8080/search/}
      - SEARXNG_LIMITER=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    expose:
      - "8080"
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

