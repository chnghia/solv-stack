general_settings:
  # Master Key sẽ được load từ environment variable LITELLM_MASTER_KEY
  # Tắt alerting vì chưa config webhook
  alerting: []
  # Debug mode (Tắt khi ra production để tăng tốc)
  detailed_debug: false

  # Không drop tool_calls từ request/response
  drop_params: false

  # Tự động hủy request tới vLLM khi client disconnect
  cancel_upstream_on_disconnect: true

model_list:
  # ----------------------------------------------------------------------
  # MODEL 1: MAIN MODEL (Qwen3 Coder - Running on vLLM)
  # ----------------------------------------------------------------------
  - model_name: gpt-oss-120b
    litellm_params:
      model: openai/gpt-oss-120b  # format: openai/<tên-model-trong-vllm>
      api_base: http://vllm-backend:8000/v1
      api_key: EMPTY  # vLLM nội bộ thường không set key
      timeout: 600    # Timeout dài cho reasoning/coding tasks
      stream_timeout: 30 # Timeout nếu không có token nào trả về trong 30s
      #max_tokens: 4096
      rpm: 1000       # Requests per minute limit
      supports_function_calling: true  # QUAN TRỌNG!
      supports_parallel_function_calling: true  # Optional

  # ----------------------------------------------------------------------
  # MODEL: LLAMA.CPP SERVER (GGUF Model)
  # ----------------------------------------------------------------------
  - model_name: llama-3-8b-gguf
    litellm_params:
      model: openai/any  # llama.cpp server is OpenAI compatible
      api_base: http://llama-server:8080/v1
      api_key: EMPTY
      timeout: 300

  # Alias cho compatibility với các tool dùng tên OpenAI
  # - model_name: gemma-4-26b
  #   litellm_params:
  #    model: openai/gemma-4-26b
  #    api_base: http://vllm-gemma:8001/v1
  #    api_key: EMPTY
  #    #timeout: 600
  #    max_tokens: 4096
  #    upports_function_calling: true  # QUAN TRỌNG!
  #    supports_parallel_function_calling: true  # Optional

  #- model_name: qwen3.5-35b
  #  litellm_params:
  #    model: openai/qwen3.5-35b
  #    api_base: http://vllm-qwen:8002/v1
  #    api_key: EMPTY
  #    timeout: 600
  #    #max_tokens: 4096
  #    upports_function_calling: true  # QUAN TRỌNG!
  #    supports_parallel_function_calling: true  # Optional

  # ----------------------------------------------------------------------
  # MODEL 2: EMBEDDING MODEL (Chạy chung vLLM hoặc service riêng)
  # Nếu bạn dùng vLLM để chạy cả embedding (flag --enable-embedding)
  # ----------------------------------------------------------------------
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/BAAI/bge-small-en-v1.5
      api_base: http://tei-embedding:80/v1
      api_key: EMPTY

# ----------------------------------------------------------------------
# ROUTER SETTINGS
# Nếu có external fallback API, uncomment và config phần dưới
# ----------------------------------------------------------------------
router_settings:
  routing_strategy: simple-shuffle
  retry_policy:
    num_retries: 1
    request_timeout: 300
    stream_timeout: 30

# ----------------------------------------------------------------------
# FALLBACKS (Uncomment khi có External API backup)
# ----------------------------------------------------------------------
# ----------------------------------------------------------------------
# LITELLM SETTINGS
# ----------------------------------------------------------------------
litellm_settings:
  set_completed_by_on_stream_disconnect: true
  allow_requests_on_stream_disconnect: false
  drop_params: true
